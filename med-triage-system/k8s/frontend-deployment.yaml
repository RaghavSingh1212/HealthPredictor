apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: triage-frontend
  template:
    metadata:
      labels:
        app: triage-frontend
    spec:
      containers:
      - name: frontend
        image: your-registry/triage-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://backend-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: triage-frontend
